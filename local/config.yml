# Local configuration

# The `Logger` logs as the standard PHP error_log
# 0 = debug, 1 = info, 2 = error

logLevel: 2 # <= set to 2 in production

# Font family and size for the admin editor textareas
editor:
  font: 'ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace'
  fontSize: '0.95rem'
  lineHeight: '1.4'
  tabSize: 4
  wordWrap: true
  tools:
    - Headings
    - "|"
    - Bold
    - Italic
  #  - Strikethrough
    - "|"
    - UnorderedList
    - OrderedList
    - "|"
    - InsertLink
    - InsertImage

# Page history: number of snapshots to keep per page
history:
  maxVersions: 50